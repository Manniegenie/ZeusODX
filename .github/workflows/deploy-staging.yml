name: Deploy to Staging (EAS Update)

on:
  push:
    branches:
      - staging

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push OTA update to staging channel
        run: |
          eas update --channel preview --message "Staging update from ${{ github.sha }}" --non-interactive
